name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -o dist/repoxray-linux-amd64 ./cmd/repoxray
          GOOS=darwin GOARCH=amd64 go build -o dist/repoxray-darwin-amd64 ./cmd/repoxray
          GOOS=darwin GOARCH=arm64 go build -o dist/repoxray-darwin-arm64 ./cmd/repoxray
          GOOS=windows GOARCH=amd64 go build -o dist/repoxray-windows-amd64.exe ./cmd/repoxray

      - name: Package artifacts
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
